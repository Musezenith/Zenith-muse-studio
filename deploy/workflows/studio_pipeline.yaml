main:
  params: [input]
  steps:
    - init:
        assign:
          - project_id: ${default(map.get(input, "project_id"), sys.get_env("GOOGLE_CLOUD_PROJECT"))}
          - region: ${default(map.get(input, "region"), sys.get_env("GCP_REGION"))}
          - api_base: ${default(map.get(input, "api_base"), sys.get_env("STUDIO_API_BASE_URL"))}
    - research:
        assign:
          - research_job:
              provider: "Gemini Enterprise"
              status: "contract_only"
              note: "Research lane is upstream of compile and represented here as orchestration metadata."
    - compile:
        call: http.post
        args:
          url: ${api_base + "/api/studio/prompt-compiler/compile"}
          auth:
            type: OIDC
          body: ${map.get(input, "compile_payload")}
        result: compile_response
    - generate:
        call: http.post
        args:
          url: ${api_base + "/api/mikage/run-three-modes"}
          auth:
            type: OIDC
          body: ${map.get(input, "generate_payload")}
        result: generate_response
    - review:
        call: http.post
        args:
          url: ${api_base + "/api/mikage/runs/" + string(map.get(generate_response.body.item, "id")) + "/review-score"}
          auth:
            type: OIDC
          body: ${map.get(input, "review_payload")}
        result: review_response
    - canon:
        call: http.post
        args:
          url: ${api_base + "/api/mikage/runs/" + string(map.get(generate_response.body.item, "id")) + "/canon-gate"}
          auth:
            type: OIDC
          body: ${map.get(input, "canon_payload")}
        result: canon_response
    - archive:
        call: http.post
        args:
          url: ${api_base + "/api/mikage/runs/" + string(map.get(generate_response.body.item, "id")) + "/archive"}
          auth:
            type: OIDC
          body: ${map.get(input, "archive_payload")}
        result: archive_response
    - done:
        return:
          research: ${research_job}
          compile: ${compile_response.body}
          generate: ${generate_response.body}
          review: ${review_response.body}
          canon: ${canon_response.body}
          archive: ${archive_response.body}
